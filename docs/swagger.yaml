swagger: "2.0"
info:
  title: Seekr API
  description: A BM25-powered full-text search engine with persistent bbolt storage. Supports plain text and JSON document ingestion with field-weighted search.
  version: "1.0"
  contact:
    name: Seekr
  license:
    name: MIT
host: localhost:8080
basePath: /

definitions:
  BoostMap:
    type: object
    description: Maps JSON field names to score multiplier weights (e.g. {"Title":2.0,"Plot":1.5})
    additionalProperties:
      type: number
      format: double

  Document:
    type: object
    properties:
      id:
        type: string
      text:
        type: string

  IndexRequest:
    type: object
    required:
      - text
    properties:
      id:
        type: string
        description: Optional document ID; auto-generated UUID if omitted
      text:
        type: string
        description: Raw document content (plain text or JSON)

  UpdateRequest:
    type: object
    required:
      - text
    properties:
      text:
        type: string
        description: New document content

  BulkIndexResult:
    type: object
    properties:
      indexed:
        type: integer
      skipped:
        type: integer
      errors:
        type: array
        items:
          type: string

  SearchRequest:
    type: object
    required:
      - q
    properties:
      q:
        type: string
        description: Search query string
      boosts:
        $ref: "#/definitions/BoostMap"

  SearchResponse:
    type: object
    properties:
      results:
        type: array
        items:
          $ref: "#/definitions/Document"

  StatsResponse:
    type: object
    properties:
      totalDocs:
        type: integer
      totalLength:
        type: integer

  PaginatedDocsResponse:
    type: object
    properties:
      documents:
        type: array
        items:
          $ref: "#/definitions/Document"
      total:
        type: integer
      page:
        type: integer
      limit:
        type: integer

  Collection:
    type: object
    properties:
      name:
        type: string
      totalDocs:
        type: integer

  CollectionsResponse:
    type: object
    properties:
      collections:
        type: array
        items:
          $ref: "#/definitions/Collection"

  CreateCollectionRequest:
    type: object
    required:
      - name
    properties:
      name:
        type: string

paths:
  /index:
    post:
      summary: Index a document
      description: Stores and indexes a document. Accepts plain text or JSON; only string values are indexed.
      tags:
        - documents
      consumes:
        - application/json
      produces:
        - text/plain
      parameters:
        - name: collection
          in: query
          description: "Collection name (default: default)"
          type: string
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/IndexRequest"
      responses:
        "201":
          description: Document created
        "400":
          description: Bad request

  /bulk-index:
    post:
      summary: Bulk index documents
      description: Accepts a JSON array of documents. Items without a "text" field use the entire object as the document body.
      tags:
        - documents
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - name: collection
          in: query
          description: "Collection name (default: default)"
          type: string
        - name: body
          in: body
          required: true
          description: Array of document objects
          schema:
            type: array
            items:
              $ref: "#/definitions/IndexRequest"
      responses:
        "200":
          description: Bulk index result
          schema:
            $ref: "#/definitions/BulkIndexResult"

  /search:
    post:
      summary: Search documents
      description: BM25 full-text search with fuzzy matching. Provide optional field boost weights to boost results by JSON field presence.
      tags:
        - search
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - name: collection
          in: query
          description: "Collection name (default: default)"
          type: string
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/SearchRequest"
      responses:
        "200":
          description: Search results ranked by BM25 score
          schema:
            $ref: "#/definitions/SearchResponse"
        "400":
          description: Bad request

  /api/documents:
    get:
      summary: List documents
      description: Returns a paginated list of all documents in a collection.
      tags:
        - documents
      produces:
        - application/json
      parameters:
        - name: collection
          in: query
          description: "Collection name (default: default)"
          type: string
        - name: page
          in: query
          description: "Page number (default: 1)"
          type: integer
        - name: limit
          in: query
          description: "Page size (default: 10)"
          type: integer
      responses:
        "200":
          description: Paginated document list
          schema:
            $ref: "#/definitions/PaginatedDocsResponse"

  /api/documents/update:
    put:
      summary: Update a document
      description: Replaces document content and atomically re-indexes it.
      tags:
        - documents
      consumes:
        - application/json
      produces:
        - text/plain
      parameters:
        - name: collection
          in: query
          description: "Collection name (default: default)"
          type: string
        - name: id
          in: query
          required: true
          description: Document ID
          type: string
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/UpdateRequest"
      responses:
        "200":
          description: Document updated
        "400":
          description: Bad request

  /api/stats:
    get:
      summary: Get collection stats
      description: Returns total document count and total indexed token count for a collection.
      tags:
        - stats
      produces:
        - application/json
      parameters:
        - name: collection
          in: query
          description: "Collection name (default: default)"
          type: string
      responses:
        "200":
          description: Collection statistics
          schema:
            $ref: "#/definitions/StatsResponse"

  /api/collections:
    get:
      summary: List collections
      description: Returns all collections with their document counts.
      tags:
        - collections
      produces:
        - application/json
      responses:
        "200":
          description: List of collections
          schema:
            $ref: "#/definitions/CollectionsResponse"

    post:
      summary: Create collection
      description: Creates a new named collection (namespace) for documents.
      tags:
        - collections
      consumes:
        - application/json
      produces:
        - text/plain
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/CreateCollectionRequest"
      responses:
        "201":
          description: Collection created
        "400":
          description: Bad request

    delete:
      summary: Delete collection
      description: Permanently deletes a collection and all its indexed documents. Cannot delete "default".
      tags:
        - collections
      produces:
        - text/plain
      parameters:
        - name: name
          in: query
          required: true
          description: Collection name
          type: string
      responses:
        "200":
          description: Collection deleted
        "400":
          description: Bad request
