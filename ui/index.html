<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seekr Enterprise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Seekr Database</div>
            <button id="openAddModalBtn" class="btn btn-primary">Add Document</button>
        </div>
    </nav>

    <main class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">Total Documents</div>
                <div class="stat-value" id="statTotalDocs">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Indexed Tokens</div>
                <div class="stat-value" id="statTotalTokens">0</div>
            </div>
        </div>

        <div class="card table-card">
            <div class="table-header">
                <h3>Document Explorer</h3>
                <div style="flex-grow:1; max-width: 400px; margin-left: 1.5rem;">
                    <input type="text" id="searchInput" class="input-lg" placeholder="Search across documents...">
                </div>
                <div class="pagination-controls" style="margin-left:auto;">
                    <button id="prevPage" class="btn btn-secondary btn-sm" disabled>Previous</button>
                    <span id="pageInfo" class="text-sm font-medium">Page 1</span>
                    <button id="nextPage" class="btn btn-secondary btn-sm">Next</button>
                </div>
            </div>
            
            <table class="data-table">
                <thead>
                    <tr>
                        <th width="20%">Doc ID</th>
                        <th width="65%">Content Snippet</th>
                        <th width="15%">Actions</th>
                    </tr>
                </thead>
                <tbody id="docsTableBody">
                    <!-- Rows populated via JS -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Add Modal -->
    <dialog id="addModal" class="modal">
        <div class="modal-content">
            <h3>Add Document</h3>
            <p class="text-sm" style="color:var(--text-secondary);margin-top:0.5rem;">Document ID: <span id="addDocIdLabel" class="font-medium code-font" style="color:var(--brand);"></span></p>
            <textarea id="addDocText" rows="6" class="mt-4" placeholder="Enter text payload to be indexed..."></textarea>
            <div class="modal-actions">
                <button id="cancelAddBtn" class="btn btn-secondary">Cancel</button>
                <button id="indexDocBtn" class="btn btn-primary">Index Request</button>
            </div>
        </div>
    </dialog>

    <!-- Edit Modal -->
    <dialog id="editModal" class="modal">
        <div class="modal-content">
            <h3>Edit Document <span id="editDocIdLabel" class="code-font" style="color:var(--brand);font-size:0.9rem;"></span></h3>
            <textarea id="editDocText" rows="6" class="mt-4"></textarea>
            <div class="modal-actions">
                <button id="cancelEditBtn" class="btn btn-secondary">Cancel</button>
                <button id="saveEditBtn" class="btn btn-primary">Save Changes</button>
            </div>
        </div>
    </dialog>

    <div id="toast" class="toast">Action Complete</div>
    <script src="app.js"></script>
</body>
</html>
